    buildable: false
  m4:
    externals:
    - spec: m4@1.4.18
      prefix: /usr
    buildable: false
  curl:
    externals:
    - spec: curl@7.61.1+ldap
      prefix: /usr
  openssl:
    externals:
    - spec: openssl@1.1.1k-fips
      prefix: /usr
  python:
    externals:
    - spec: python@3.12.4
      prefix: /projects/aue/hpc/deploy/f9a38d2c/linux-rhel8-x86_64/gcc-12.3.0/python-3.12.4-dln57gx
    buildable: false
    modules:
    - aue/python/3.12.4
  cmake: 
    externals:
    - spec: cmake@3.31.6
      prefix: /projects/aue/hpc/deploy/75321270/linux-rhel8-x86_64/gcc-14.2.0/cmake-3.31.6-7jvewq7
    buildable: false 
    modules:
    - aue/cmake/3.31.6
  netcdf-c:
    require: "+shared build_system=autotools"
  libxml2:
    require: "build_system=autotools"
  mpi:
    require: "cray-mpich"
  blas:
    require: "netlib-lapack"
  lapack:
    require: "netlib-lapack"
  hdf5:
    require: "~fortran"
  kynema-sgf:
    require: "target=x86_64"
  all:
    prefer:
      - "%intel-oneapi-compilers@2023.2.0"
      - "build_type=Release"
      - "target=sapphirerapids"
    conflict:
      - "%gcc"
    permissions:
      write: group
      group: wg-WindHFM
    providers:
      mpi:
      - openmpi
