    modules:
    - aue/openmpi/4.1.6-oneapi-2023.2.0
  boost:
    externals:
    - spec: boost@1.83.0
      prefix: /projects/aue/hpc/builds/x86_64/rhel8/c8f7ebb0/tpls-gcc-12.1.0-openmpi-4.1.6/install/linux-rhel8-x86_64/gcc-12.1.0/boost-1.83.0-em7p3wm
