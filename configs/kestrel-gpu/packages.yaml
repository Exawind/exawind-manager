packages:
  gcc:
    externals:
      - spec: gcc@13.1.0
        prefix: /opt/rh/gcc-toolset-13/root
        extra_attributes:
          compilers:
            c: /opt/rh/gcc-toolset-13/root/bin/gcc
            cxx: /opt/rh/gcc-toolset-13/root/bin/g++
            fortran: /opt/rh/gcc-toolset-13/root/bin/gfortran
  cray-mpich:
    require: "@=8.1.32"
    buildable: false
    externals:
      - spec: "cray-mpich@=8.1.32%gcc@13.1.0"
        prefix: /opt/cray/pe/mpich/8.1.32/ofi/gnu/11.2
        modules:
          - libfabric/1.22.0
  cuda:
    require: "@=12.4.1"
  boost:
    require: "@=1.80.0"
  mpi:
    require: "cray-mpich@8.1.28"
  blas:
    require: "netlib-lapack"
  lapack:
    require: "netlib-lapack"
  c:
    require: "gcc@13.1.0"
  cxx:
    require: "gcc@13.1.0"
  fortran:
    require: "gcc@13.1.0"
  all:
    prefer:
      - "build_type=Release"
      - "cuda_arch=90"
