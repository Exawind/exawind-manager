packages:
  cray-mpich:
    externals:
    - spec: cray-mpich@8.1.29
      prefix: /opt/cray/pe/mpich/8.1.29/ofi/intel/2022.1
      extra_attributes:
        environment:
          append_path:
            LD_LIBRARY_PATH: /opt/cray/libfabric/1.15.2.0/lib64
    buildable: false
  gcc:
    externals:
    - spec: gcc@12.4.0
      prefix: /glade/u/apps/casper/24.12/spack/opt/spack/gcc/12.4.0/5b5c
      extra_attributes:
        compilers:
          c: /glade/u/apps/casper/24.12/spack/opt/spack/gcc/12.4.0/5b5c/bin/gcc
          cxx: /glade/u/apps/casper/24.12/spack/opt/spack/gcc/12.4.0/5b5c/bin/g++
          fortran: /glade/u/apps/casper/24.12/spack/opt/spack/gcc/12.4.0/5b5c/bin/gfortran
  intel-oneapi-compilers:
    externals:
    - spec: intel-oneapi-compilers@2024.2.1
      prefix: /glade/u/apps/casper/24.12/spack/opt/spack/intel-oneapi-compilers/2024.2.1/gcc/12.4.0/iq3b
      extra_attributes:
        compilers:
          c: /glade/u/apps/casper/24.12/spack/opt/spack/intel-oneapi-compilers/2024.2.1/gcc/12.4.0/iq3b/compiler/latest/bin/icx
          cxx: /glade/u/apps/casper/24.12/spack/opt/spack/intel-oneapi-compilers/2024.2.1/gcc/12.4.0/iq3b/compiler/latest/bin/icpx
          fortran: /glade/u/apps/casper/24.12/spack/opt/spack/intel-oneapi-compilers/2024.2.1/gcc/12.4.0/iq3b/compiler/latest/bin/ifx
    variants:
    - +envmods
    - +nvidia
  mpi:
    require: cray-mpich
  blas:
    require: intel-oneapi-mkl
  lapack:
    require: intel-oneapi-mkl
  pkgconfig:
    require: pkg-config
  tbb:
    require: intel-oneapi-tbb
  intel-oneapi-mkl:
    require: "@2024.2.1"
  all:
    target:
    # This target is lowest-common denominator between Intel and Milans
    - x86_64_v3
    prefer:
    - '%intel-oneapi-compilers@2024.2.1'
