packages:
  intel-oneapi-compilers:
    externals:
      - spec: intel-oneapi-compilers@2025.3.0
        prefix: /nopt/nlr/apps/kestrel-cpu/craygen/oneapi/compiler/2025.3/
        extra_attributes:
          compilers:
            c: /nopt/nlr/apps/kestrel-cpu/craygen/oneapi/compiler/2025.3//bin/icx
            cxx: /nopt/nlr/apps/kestrel-cpu/craygen/oneapi/compiler/2025.3//bin/icpx
            fortran: /nopt/nlr/apps/kestrel-cpu/craygen/oneapi/compiler/2025.3/bin/ifx
        modules:
          - PrgEnv-intel/8.6.0
          - intel/2025.3
  gcc:
    externals:
      - spec: gcc@13.1.0
        prefix: /opt/rh/gcc-toolset-13/root
        extra_attributes:
          compilers:
            c: /opt/rh/gcc-toolset-13/root/bin/gcc
            cxx: /opt/rh/gcc-toolset-13/root/bin/g++
            fortran: /opt/rh/gcc-toolset-13/root/bin/gfortran
  cray-mpich:
    require: "@8.1.32"
    buildable: false
    externals:
      - spec: "cray-mpich@8.1.32%intel-oneapi-compilers@2025.3.0"
        prefix: /opt/cray/pe/mpich/8.1.32/ofi/intel/2022.1
        modules:
          - libfabric/1.22.0
      - spec: "cray-mpich@8.1.32%gcc@13.1.0"
        prefix: /opt/cray/pe/mpich/8.1.32/ofi/gnu/11.2
        modules:
          - libfabric/1.22.0
  boost:
    require: "@1.80.0"
  netcdf-c:
    require: "+shared build_system=autotools"
  libxml2:
    require: "build_system=autotools"
  mpi:
    require: "cray-mpich"
  blas:
    require: "netlib-lapack"
  lapack:
    require: "netlib-lapack"
  hdf5:
    require: "~fortran"
  kynema-sgf:
    require: "target=x86_64"
  all:
    prefer:
      - "%intel-oneapi-compilers@2023.2.0"
      - "build_type=Release"
      - "target=sapphirerapids"
    conflict:
      - "%gcc"
